name: OllamaChat
version: '${version}'
main: com.ollamachat.core.Ollamachat
api-version: '1.20'
authors: [xwwsdd]
description: A plugin used to connect Ollama and OtherAI with Minecraft, providing a public API for other plugins.
website: https://chat.sarskin.cn/invite/iHgI6LTX

commands:
  ollamachat:
    description: Manage OllamaChat plugin (reload configuration or toggle AI)
    usage: "{usage-ollamachat}"
    permission: ollamachat.reload
  aichat:
    description: Interact with other AI services
    usage: "{usage-aichat}"
    permission: ollamachat.use

permissions:
  ollamachat.*:
    description: All OllamaChat permissions
    default: op
    children:
      ollamachat.use: true
      ollamachat.reload: true
      ollamachat.toggle: true
      ollamachat.prompt.*: true
      ollamachat.conversation.*: true
      ollamachat.suggests.toggle: true
      ollamachat.suggests-presets.toggle: true
      ollamachat.search.*: true

  ollamachat.use:
    description: Allows using basic AI chat commands
    default: true

  ollamachat.reload:
    description: Allows reloading the plugin configuration
    default: op

  ollamachat.toggle:
    description: Allows toggling AI models on/off
    default: op

  ollamachat.prompt.*:
    description: All prompt management permissions
    default: op
    children:
      ollamachat.prompt.set: true
      ollamachat.prompt.delete: true
      ollamachat.prompt.list: true
      ollamachat.prompt.select: true

  ollamachat.conversation.*:
    description: All conversation management permissions
    default: true
    children:
      ollamachat.conversation.new: true
      ollamachat.conversation.select: true
      ollamachat.conversation.delete: true
      ollamachat.conversation.list: true

  ollamachat.suggests.toggle:
    description: Allows toggling suggested responses for self
    default: true

  ollamachat.suggests-presets.toggle:
    description: Allows toggling suggested response presets globally
    default: op

  ollamachat.search.*:
    description: All web search management permissions
    default: op
    children:
      ollamachat.search.toggle: true
      ollamachat.search.status: true
      ollamachat.search.query: true
      ollamachat.search.setkey: true
      ollamachat.search.setcount: true
      ollamachat.search.keywords: true

  ollamachat.search.toggle:
    description: Allows enabling/disabling web search
    default: op

  ollamachat.search.status:
    description: Allows viewing search status
    default: true

  ollamachat.search.query:
    description: Allows performing web searches
    default: true

  ollamachat.search.setkey:
    description: Allows setting Bocha API key
    default: op

  ollamachat.search.setcount:
    description: Allows setting search result count
    default: op

  ollamachat.search.keywords:
    description: Allows managing trigger keywords
    default: op